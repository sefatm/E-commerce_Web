<nav class="navbar">

  <!-- Left: Toggle + Breadcrumb -->
  <div class="navbar-left">
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <line x1="2" y1="4" x2="16" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="2" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="2" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="breadcrumb">
      <span class="bread-home" routerLink="/" style="cursor:pointer" title="Go to Homepage">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 7L6.5 2L12 7v5H8.5V9h-3v3H1V7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="bread-brand">{{ siteName }}</span>
      <span class="bread-sep">/</span>
      <span class="bread-current">{{ pageTitle }}</span>
    </div>
  </div>

  <!-- Center: Search -->
  <div class="navbar-center">
    <div class="search-wrap" [class.focused]="searchFocused">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      <input
        type="text"
        class="search-input"
        placeholder="Search products, orders, customers..."
        [(ngModel)]="searchQuery"
        (focus)="searchFocused = true"
        (blur)="searchFocused = false"
        (keyup.enter)="search()"
      />
      <button type="button" class="search-go" (click)="search()" title="Search">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 6.5h7M7 4l2.5 2.5L7 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="navbar-right">

    <!-- Notifications -->
    <div class="action-btn" (click)="toggleNotif()" [class.active]="showNotif" title="Notifications">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M8.5 1.5a5.5 5.5 0 015.5 5.5c0 4.5 1.5 5.5 1.5 5.5H2s1.5-1 1.5-5.5a5.5 5.5 0 015.5-5.5z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M7 13.5a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
    </div>

    <!-- Notification Dropdown -->
    <div class="notif-dropdown" *ngIf="showNotif">
      <div class="dropdown-header">
        <span class="dropdown-title">Notifications</span>
        <span class="mark-all" (click)="refreshNotifications()">Refresh</span>
      </div>
      <div class="notif-item" *ngFor="let item of notifications" (click)="goToNotification(item)">
        <div class="notif-dot" [class.warn]="item.level === 'warn'" [class.info]="item.level === 'info'" [class.read]="item.level === 'success'"></div>
        <div class="notif-body">
          <div class="notif-text">{{ item.title }}</div>
          <div class="notif-time">{{ item.detail }}</div>
        </div>
      </div>
      <div class="dropdown-footer" routerLink="/admin/dashboard" (click)="closeAll()">View dashboard</div>
    </div>

    <!-- Divider -->
    <div class="nav-divider"></div>

    <!-- Profile -->
    <div class="profile-wrap" (click)="toggleProfile()" [class.active]="showProfile">
      <div class="profile-avatar">
        <img *ngIf="adminPhoto" [src]="adminPhoto" alt="Admin">
        <span *ngIf="!adminPhoto">{{ adminInitials() }}</span>
      </div>
      <div class="profile-info">
        <div class="profile-name">{{ adminName }}</div>
        <div class="profile-role">{{ adminRole }}</div>
      </div>
      <span class="profile-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" *ngIf="showProfile">
      <div class="profile-header">
        <div class="pd-avatar">
          <img *ngIf="adminPhoto" [src]="adminPhoto" alt="Admin">
          <span *ngIf="!adminPhoto">{{ adminInitials() }}</span>
        </div>
        <div>
          <div class="pd-name">{{ adminName }}</div>
          <div class="pd-email">{{ adminEmail }}</div>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <div class="pd-item" (click)="goToProfile()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 13c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        My Profile
      </div>
      <div class="pd-item" (click)="goToSettings()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.9 2.9l1.4 1.4M9.7 9.7l1.4 1.4M2.9 11.1l1.4-1.4M9.7 4.3l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Settings
      </div>
      <div class="dropdown-divider"></div>
      <div class="pd-item danger" (click)="logout()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2h3a1 1 0 011 1v8a1 1 0 01-1 1H9M5.5 9.5L9 7l-3.5-2.5M9 7H2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Logout
      </div>
    </div>

  </div>

</nav>

<!-- Overlay: click outside to close dropdowns -->
<div class="nav-overlay" *ngIf="showNotif || showProfile" (click)="closeAll()"></div>
