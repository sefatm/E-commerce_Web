<!-- shipping-zones.component.html -->
<div class="page-wrapper">

  <div class="page-header">
    <div>
      <h1 class="page-title">Shipping Zones</h1>
      <p class="page-sub">Manage geographic delivery zones.</p>
    </div>
    <button class="btn-primary" (click)="toggleForm()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      {{ showForm ? 'Cancel' : 'Add Zone' }}
    </button>
  </div>

  <!-- Add / Edit Form -->
  <div class="form-card" *ngIf="showForm">
    <div class="card-head">
      <div class="card-icon blue">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="7.5" cy="6" r="3" stroke="currentColor" stroke-width="1.3"/>
          <path d="M7.5 1C4.5 1 2 3.5 2 6.5c0 4 5.5 7.5 5.5 7.5S13 10.5 13 6.5C13 3.5 10.5 1 7.5 1z" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </div>
      <span class="card-title">{{ editId ? 'Edit Zone' : 'New Shipping Zone' }}</span>
    </div>
    <form (ngSubmit)="onSubmit()" #zoneForm="ngForm">
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label required">Zone Name</label>
          <input type="text" class="form-input" [(ngModel)]="form.name" name="name" required placeholder="e.g. Dhaka city"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" [(ngModel)]="form.status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" [(ngModel)]="form.description" name="description" placeholder="Short description"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Regions / Districts <span class="hint">(comma separated)</span></label>
        <input type="text" class="form-input" [(ngModel)]="form.regions" name="regions" placeholder="Dhaka, Narayanganj, Gazipur"/>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="zoneForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Saving...' : (editId ? 'Update Zone' : 'Save Zone') }}
        </button>
        <button type="button" class="btn-outline" (click)="cancelForm()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div><p>Loading...</p>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!isLoading && zones.length === 0">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="20" r="8" stroke="#cbd5e1" stroke-width="2"/>
      <path d="M24 4C14.1 4 6 12.1 6 22c0 12 18 24 18 24s18-12 18-24c0-9.9-8.1-18-18-18z" stroke="#cbd5e1" stroke-width="2"/>
    </svg>
    <p class="empty-text">No shipping zones yet.</p>
  </div>

  <!-- Zones Grid -->
  <div class="zones-grid" *ngIf="!isLoading && zones.length > 0">
    <div class="zone-card" *ngFor="let zone of zones">
      <div class="zone-top">
        <div class="zone-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="8" r="3" fill="currentColor" opacity="0.7"/>
            <path d="M10 2C6.7 2 4 4.7 4 8c0 5 6 10 6 10s6-5 6-10c0-3.3-2.7-6-6-6z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div class="zone-info">
          <div class="zone-name">{{ zone.name }}</div>
          <div class="zone-desc">{{ zone.description || 'No description' }}</div>
        </div>
        <span class="status-pill" [ngClass]="zone.status === 'active' ? 'active' : 'inactive'">
          {{ zone.status }}
        </span>
      </div>

      <div class="zone-regions" *ngIf="zone.regions">
        <div class="regions-label">Coverage:</div>
        <div class="regions-tags">
          <span class="region-tag" *ngFor="let r of zone.regions.split(',').slice(0, 4)">{{ r.trim() }}</span>
          <span class="region-more" *ngIf="zone.regions.split(',').length > 4">
            +{{ zone.regions.split(',').length - 4 }} more
          </span>
        </div>
      </div>

      <div class="zone-actions">
        <button class="icon-btn edit" title="Edit" (click)="startEdit(zone)">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M9 2l2 2-7 7H2v-2L9 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Edit
        </button>
        <button class="icon-btn danger" title="Delete" (click)="deleteZone(zone.id)">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M2 3.5h9M5 3.5V2h3v1.5M4.5 3.5v6a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Delete
        </button>
      </div>
    </div>
  </div>

</div>
