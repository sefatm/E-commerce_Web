<app-site-header></app-site-header>

<div class="pr-page">
  <div class="pr-card">
    <i [class]="iconClass"></i>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>

    <div class="pr-order-info" *ngIf="!isLoading && order">
      <div class="pr-row">
        <span>Order Code</span>
        <strong>{{ order.orderCode }}</strong>
      </div>
      <div class="pr-row">
        <span>Amount</span>
        <strong>৳{{ order.totalAmount | number:'1.2-2' }}</strong>
      </div>
      <div class="pr-row">
        <span>Payment Status</span>
        <span class="pr-badge" [class.paid]="order.paymentStatus === 'PAID'" [class.unpaid]="order.paymentStatus !== 'PAID'">
          {{ order.paymentStatus }}
        </span>
      </div>
    </div>

    <div class="pr-loading" *ngIf="isLoading">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading order details...
    </div>

    <div class="pr-actions">
      <button class="pr-btn-primary" (click)="goToOrders()">
        <i class="fa-solid fa-receipt"></i> View My Orders
      </button>
      <button class="pr-btn-secondary" (click)="goHome()">
        Continue Shopping
      </button>
    </div>
  </div>
</div>
