<div class="scan-page"><div class="scan-card" *ngIf="!loading && order"><div class="scan-head"><img src="assets/Rural_mart_logo.png" alt="Rural Mart"><div><h2>Order Scan Update</h2><p>{{order.orderCode}}</p></div></div><div class="grid"><div><span>Customer</span><b>{{order.customerName}}</b></div><div><span>Current status</span><b class="green">{{order.status}}</b></div><div><span>Payment</span><b>{{order.paymentMethod}} / {{order.paymentStatus}}</b></div><div><span>Total</span><b>৳{{order.totalAmount}}</b></div></div><label>Next step</label><select [(ngModel)]="status"><option value="">Select status</option><option *ngFor="let s of steps" [value]="s">{{s}}</option></select><label>Note</label><textarea [(ngModel)]="note" rows="3" placeholder="Optional update note"></textarea><div class="ok" *ngIf="message">{{message}}</div><div class="err" *ngIf="error">{{error}}</div><button (click)="save()" [disabled]="!status">Save Step</button></div><div class="scan-card" *ngIf="loading">Loading order...</div></div>
